<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuskCo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 60px 24px 40px;
            text-align: center;
            border-bottom: 1px solid #1a1a1a;
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #ffffff;
        }

        header p {
            margin-top: 12px;
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            color: #666;
            text-transform: uppercase;
        }

        main {
            width: 100%;
            max-width: 800px;
            padding: 60px 24px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact {
            text-align: center;
        }

        .contact p {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 24px;
        }

        .contact a {
            display: inline-block;
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #fff;
            text-decoration: none;
            border: 1px solid #333;
            padding: 12px 32px;
            transition: border-color 0.2s, background 0.2s;
        }

        .contact a:hover {
            border-color: #555;
            background: #111;
        }

        footer {
            width: 100%;
            padding: 32px 24px;
            text-align: center;
            border-top: 1px solid #1a1a1a;
            font-size: 0.75rem;
            color: #444;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <header>
        <h1>DuskCo</h1>
        <p>Products that perform</p>
    </header>

    <main>
        <div class="contact">
            <p>Get in touch</p>
            <a href="mailto:contact@duskco.com">Contact Us</a>
        </div>
    </main>

    <footer>
        &copy; 2026 DuskCo. All rights reserved.
    </footer>
</body>
</html>
